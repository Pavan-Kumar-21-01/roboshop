apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping-config
data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  labels:
    app: shipping
    tier: app
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping
      tier: app
      environment: dev
  template:
    metadata:
      labels:
        app: shipping
        tier: app
        environment: dev
    spec:
      containers:
      - name: shipping
        image: pavankg2101/shipping:v1.0
        envFrom:
        - configMapRef:
            name: shipping-config
---
apiVersion: v1
kind: Service
metadata:
  name: shipping
spec:
  selector:
    app: shipping
    tier: app
    environment: dev
  type: ClusterIP
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
