apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
    tier: db
    environment: dev
spec:
  serviceName: "rabbitmq"
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
      tier: db
      environment: dev
  template:
    metadata:
      labels:
        app: rabbitmq
        tier: db
        environment: dev
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3
        volumeMounts:
        - name: rabbit
          mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
  - metadata: 
      name: rabbit
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "roboshop-dynamic-ebs"
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
    tier: db
    environment: dev
  clusterIP: None
  ports:
    - port: 5672
      protocol: TCP
      targetPort: 5672
