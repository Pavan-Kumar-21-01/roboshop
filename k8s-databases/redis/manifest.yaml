apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    app: redis
    tier: db
    environment: dev
spec:
  serviceName: "redis"
  replicas: 1
  selector:
    matchLabels:
      app: redis
      tier: db
      environment: dev
  template:
    metadata:
      labels:
        app: redis
        tier: db
        environment: dev
    spec:
      containers:
      - name: redis
        image: redis:7
        volumeMounts:
        - name: redis
          mountPath: /data
  volumeClaimTemplates:
  - metadata: 
      name: redis
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "roboshop-dynamic-ebs"
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
    tier: db
    environment: dev
  clusterIP: None
  ports:
    - port: 6379
      protocol: TCP
      targetPort: 6379
