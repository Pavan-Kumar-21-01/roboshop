apiVersion: v1
kind: Namespace
metadata:
  name: roboshop
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: roboshop
  name: golivi-role
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["pods","deployments","services"]
  verbs: ["get", "watch", "list","create","update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: golivi-rolebinding
  namespace: roboshop
subjects:
- kind: User
  name: golivi
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: golivi-role
  apiGroup: rbac.authorization.k8s.io