apiVersion: v1
kind: ConfigMap
metadata: 
  name: catalogue-config
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels:
    app: catalogue
    tier: app
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogue
      tier: app
      environment: dev
  template:
    metadata:
      labels:
        app: catalogue
        tier: app
        environment: dev
    spec:
      containers:
      - name: catalogue
        image: pavankg2101/catalogue:v1.0
        envFrom:
          - configMapRef:
            name: catalogue-config
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
spec:
  selector:
    app: catalogue
    tier: app
    environment: dev
  type: ClusterIP
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
