apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
    tier: db
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
      tier: db
      environment: dev
  template:
    metadata:
      labels:
        app: rabbitmq
        tier: db
        environment: dev
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
    tier: db
    environment: dev
  type: ClusterIP
  ports:
    - port: 5672
      protocol: TCP
      targetPort: 5672
