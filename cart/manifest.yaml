apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-config
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  labels:
    app: cart
    tier: app
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
      tier: app
      environment: dev
  template:
    metadata:
      labels:
        app: cart
        tier: app
        environment: dev
    spec:
      containers:
      - name: cart
        image: pavankg2101/cart:v1.0
        envFrom:
        - configMapRef:
            name: cart-config
---
apiVersion: v1
kind: Service
metadata:
  name: cart
spec:
  selector:
    app: cart
    tier: app
    environment: dev
  type: ClusterIP
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
